name: Publish to npm

# Bump the patch version and publish on every push to main that touches
# package source or guideline content. Version bumps themselves are pushed
# back to main with [skip ci] in the message so they do not loop.
# Publish is gated on the Test workflow — a red suite blocks release.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'guidelines/**'
      - 'package.json'
      - '.github/workflows/publish.yml'

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  publish:
    needs: test
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          scope: '@experience_alto'

      # Fail fast with a clear signal if NPM_TOKEN is wrong / expired /
      # revoked, instead of burning through ci + build + version-bump first
      # and failing at `npm publish` with an opaque 401/404. `npm whoami` is
      # the only cross-token-type check that reliably works — listing scope
      # packages needs org-level permissions that granular tokens (rightly)
      # do not grant, so don't include it here.
      - name: Verify npm auth
        run: npm whoami --registry=https://registry.npmjs.org
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Bump patch version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          npm version patch -m "chore(release): %s [skip ci]"

      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push version bump
        run: git push --follow-tags
