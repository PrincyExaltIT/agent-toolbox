name: Publish to GitHub Packages

# Bump the patch version and publish on every push to main that touches
# package source or guideline content. Version bumps themselves are pushed
# back to main with [skip ci] in the message so they do not loop.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'guidelines/**'
      - 'package.json'
      - '.github/workflows/publish.yml'

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          scope: '@experience_alto'

      # Fail fast with a clear signal if NPM_TOKEN is wrong / expired / not
      # authorised for this scope, instead of burning through ci + build +
      # version-bump first and failing at `npm publish` with an opaque 404.
      - name: Verify npm auth
        run: |
          echo "Authenticated as: $(npm whoami --registry=https://registry.npmjs.org)"
          npm access list packages --registry=https://registry.npmjs.org | grep '@experience_alto' || {
            echo "::error::NPM_TOKEN has no access to any @experience_alto package. Token likely belongs to a different user, or the owner is not a publisher on the scope."
            exit 1
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Bump patch version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          npm version patch -m "chore(release): %s [skip ci]"

      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push version bump
        run: git push --follow-tags
